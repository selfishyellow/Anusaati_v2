version: '3.8'

services:
  bot:
    build: .
    env_file: .env
    depends_on:
      - db
    volumes:
      - ./assets:/app/assets

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: forest_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
